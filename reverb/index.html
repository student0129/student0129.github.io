<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>Live Conversation Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
    <style>
        /* Base styles */
        body {
            font-family: 'Inter', sans-serif;
            /* Use a subtle gradient for depth */
            background-color: #f9fafb;
            font-weight: 300; /* Set base font to light */
        }

        /* Dark mode base */
        .dark body {
            background-color: #0d1117; /* GitHub-like dark bg */
        }

        /* Custom Google Green */
        .text-google-green { color: #00685B; } /* A slightly deeper, more accessible green */
        .dark .text-google-green { color: #34A853; }
        .bg-google-green { background-color: #00685B; }
        .dark .bg-google-green { background-color: #34A853; }
        .border-google-green { border-color: #00685B; }
        .dark .border-google-green { border-color: #34A853; }

        /* Custom scrollbars for a cleaner look */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #4b5563;
        }
        .dark ::-webkit-scrollbar-thumb:hover {
            background: #6b7280;
        }

        /* Fade-out animation for temporary cards */
        .fade-out {
            animation: fadeOut 0.5s ease-out forwards;
        }
        @keyframes fadeOut {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0; transform: scale(0.95); height: 0; margin-bottom: 0; padding: 0; }
        }

        /* Streamed-answer typography */
        .reverb-answer p { margin: 0 0 0.5rem; }
        .reverb-answer ul { list-style: disc; margin: 0 0 0.5rem 1.25rem; }
        .reverb-answer ol { list-style: decimal; margin: 0 0 0.5rem 1.25rem; }
        .reverb-answer li { margin: 0.15rem 0; }
        .reverb-answer h4 { font-weight: 500; margin: 0.5rem 0 0.25rem; }
        .reverb-answer code { padding: 0 0.25rem; border-radius: 4px; background: rgba(0,0,0,0.06); font-size: 0.9em; }
        .dark .reverb-answer code { background: rgba(255,255,255,0.1); }
        .reverb-answer pre { padding: 0.5rem 0.75rem; border-radius: 8px; overflow-x: auto; background: rgba(0,0,0,0.06); margin: 0 0 0.5rem; }
        .dark .reverb-answer pre { background: rgba(255,255,255,0.08); }
        .reverb-answer pre code { background: none; padding: 0; }
    </style>
</head>
<body class="text-gray-800 dark:text-gray-200 flex flex-col h-screen overflow-hidden">

    <header class="flex flex-col md:flex-row justify-between items-center p-4 border-b border-gray-200 dark:border-gray-700 flex-shrink-0 bg-white dark:bg-gray-800/50 backdrop-blur-sm">
        <div class="flex items-center space-x-3">
            <svg class="w-8 h-8 text-google-green" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 10v2a7 7 0 0 1-14 0v-2" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 19v4" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M8 23h8" />
            </svg>
            <h1 class="text-2xl text-google-green">Live Conversation Analyzer</h1>
        </div>

        <div class="flex items-center space-x-4 mt-4 md:mt-0">
            <div class="flex items-center space-x-2">
                <div id="status-light" class="w-3 h-3 rounded-full bg-gray-400"></div>
                <span id="status" class="text-sm font-normal text-gray-500 dark:text-gray-400">Not Listening</span>
            </div>

            <button id="start-btn" class="px-5 py-2.5 text-sm font-normal text-white bg-google-green rounded-full shadow-sm hover:opacity-90 transition-opacity focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-google-green dark:focus:ring-offset-gray-900">
                Start Listening
            </button>
            <button id="stop-btn" class="hidden px-5 py-2.5 text-sm font-normal text-white bg-red-600 rounded-full shadow-sm hover:bg-red-700 transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 dark:focus:ring-offset-gray-900">
                Stop Listening
            </button>
        </div>
    </header>

    <main class="flex-grow flex flex-col md:flex-row overflow-hidden space-y-4 md:space-y-0 md:space-x-4 p-4">

        <div class="flex flex-col flex-1 h-1/2 md:h-full md:w-1/2 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800/80 shadow-sm overflow-hidden">
            <h2 class="p-3 text-lg font-normal border-b border-gray-200 dark:border-gray-700 flex-shrink-0 text-google-green dark:text-google-green">Live Transcript</h2>
            <div id="transcript-container" class="flex-grow p-4 md:p-6 overflow-y-auto text-base leading-relaxed text-gray-700 dark:text-gray-300">
                <span id="final-transcript"></span>
                <span id="interim-transcript" class="text-gray-400 dark:text-gray-500"></span>
            </div>
        </div>

        <div class="flex flex-col flex-1 h-1/2 md:h-full md:w-1/2 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800/80 shadow-sm overflow-hidden">
            <h2 class="p-3 text-lg font-normal border-b border-gray-200 dark:border-gray-700 flex-shrink-0 text-google-green dark:text-google-green">AI Insights</h2>
            <div id="insights-container" class="flex-grow p-4 overflow-y-auto space-y-4 bg-gray-50 dark:bg-gray-900/50">
                <div id="placeholder-card" class="flex flex-col items-center justify-center h-full text-center text-gray-400 dark:text-gray-500 p-10">
                    <svg class="w-16 h-16 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 00-2.456 2.456zM18 13.5l.259 1.035a3.375 3.375 0 002.456 2.456L21.75 18l-1.035.259a3.375 3.375 0 00-2.456 2.456L18 21.75l-.259-1.035a3.375 3.375 0 00-2.456-2.456L14.25 18l1.035-.259a3.375 3.375 0 002.456-2.456L18 13.5z" />
                    </svg>
                    <p>Deep questions and technical explanations will appear here automatically.</p>
                </div>
            </div>
        </div>

    </main>

    <footer class="flex-shrink-0 p-2 text-center bg-gray-100 dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700">
        <p id="error" class="text-sm text-red-500"></p>
    </footer>

    <script>
        // Wake Up Server on Page Load
        fetch('https://api-promontory.onrender.com', { method: 'GET' }).catch(() => {});

        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const statusLight = document.getElementById('status-light');
        const statusEl = document.getElementById('status');
        const errorEl = document.getElementById('error');
        const finalTranscriptEl = document.getElementById('final-transcript');
        const interimTranscriptEl = document.getElementById('interim-transcript');
        const insightsContainer = document.getElementById('insights-container');
        const placeholderCard = document.getElementById('placeholder-card');
        const transcriptContainer = document.getElementById('transcript-container');

        const apiUrl = 'https://api-promontory.onrender.com/api/analyze';

        // --- Segmentation tuning ---
        const FLUSH_PAUSE_MS = 1400;   // send an utterance this long after speech pauses
        const MIN_UTTERANCE = 12;      // ignore very short fragments
        const MAX_UTTERANCE = 320;     // force a flush before it grows unwieldy
        const CONTEXT_CHARS = 1800;    // rolling conversation context sent with each utterance

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            errorEl.textContent = 'Speech recognition is not supported by your browser. Please use Chrome or Edge.';
            startBtn.disabled = true;
        }
        const recognition = SpeechRecognition ? new SpeechRecognition() : null;
        if (recognition) {
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';
        }

        let isListening = false;
        let committedTranscript = '';   // everything finalized so far (context source)
        let pendingUtterance = '';      // finalized text not yet sent for analysis
        let flushTimer = null;

        // ---------- small helpers ----------
        function escapeHtmlText(s) {
            return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }

        // Minimal, safe markdown -> HTML (escapes first, then formats a useful subset).
        function renderMarkdown(src) {
            const inline = (s) => escapeHtmlText(s)
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/\*([^*]+)\*/g, '<em>$1</em>')
                .replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener" class="underline text-google-green">$1</a>');

            const lines = src.replace(/\r/g, '').split('\n');
            let html = '', list = null, inCode = false, code = '';
            const closeList = () => { if (list) { html += `</${list}>`; list = null; } };

            for (const raw of lines) {
                const line = raw.replace(/\s+$/, '');
                if (/^\s*```/.test(line)) {
                    if (inCode) { html += `<pre><code>${escapeHtmlText(code)}</code></pre>`; code = ''; inCode = false; }
                    else { closeList(); inCode = true; }
                    continue;
                }
                if (inCode) { code += line + '\n'; continue; }

                let m;
                if ((m = line.match(/^#{1,4}\s+(.*)/))) { closeList(); html += `<h4>${inline(m[1])}</h4>`; }
                else if ((m = line.match(/^\s*[-*]\s+(.*)/))) { if (list !== 'ul') { closeList(); html += '<ul>'; list = 'ul'; } html += `<li>${inline(m[1])}</li>`; }
                else if ((m = line.match(/^\s*\d+\.\s+(.*)/))) { if (list !== 'ol') { closeList(); html += '<ol>'; list = 'ol'; } html += `<li>${inline(m[1])}</li>`; }
                else if (line.trim() === '') { closeList(); }
                else { closeList(); html += `<p>${inline(line)}</p>`; }
            }
            if (inCode) html += `<pre><code>${escapeHtmlText(code)}</code></pre>`;
            closeList();
            return html;
        }

        const spinnerSvg = `<svg class="animate-spin h-5 w-5 text-google-green" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`;

        function insightsAtBottom() {
            return insightsContainer.scrollHeight - insightsContainer.scrollTop - insightsContainer.clientHeight < 80;
        }

        // ---------- listening lifecycle ----------
        function startListening() {
            if (isListening || !recognition) return;
            isListening = true;
            committedTranscript = finalTranscriptEl.textContent || '';
            pendingUtterance = '';
            recognition.start();

            startBtn.classList.add('hidden');
            stopBtn.classList.remove('hidden');
            statusLight.classList.remove('bg-gray-400');
            statusLight.classList.add('bg-green-500', 'animate-pulse');
            statusEl.textContent = 'Listening...';
            errorEl.textContent = '';
        }

        function stopListening() {
            if (!isListening || !recognition) return;
            isListening = false;
            flushUtterance();           // don't lose a trailing question
            recognition.stop();

            stopBtn.classList.add('hidden');
            startBtn.classList.remove('hidden');
            statusLight.classList.remove('bg-green-500', 'animate-pulse');
            statusLight.classList.add('bg-gray-400');
            statusEl.textContent = 'Not Listening';
        }

        recognition && (recognition.onresult = (event) => {
            let interim = '';
            let newFinal = '';
            const atBottom = transcriptContainer.scrollHeight - transcriptContainer.scrollTop - transcriptContainer.clientHeight < 50;

            for (let i = event.resultIndex; i < event.results.length; i++) {
                if (event.results[i].isFinal) newFinal += event.results[i][0].transcript + ' ';
                else interim += event.results[i][0].transcript;
            }

            if (newFinal) {
                pendingUtterance += newFinal;
                scheduleFlush();
            }

            finalTranscriptEl.textContent = committedTranscript + pendingUtterance;
            interimTranscriptEl.textContent = interim;
            if (atBottom) transcriptContainer.scrollTop = transcriptContainer.scrollHeight;
        });

        if (recognition) {
            recognition.onend = () => { if (isListening) recognition.start(); };
            recognition.onerror = (event) => {
                errorEl.textContent = `Speech recognition error: ${event.error}`;
                stopListening();
            };
        }

        // Flush the pending utterance at a sentence boundary, a pause, or a max length —
        // so a question isn't chopped across Web-Speech "final" fragments.
        function scheduleFlush() {
            const t = pendingUtterance.trim();
            if (/[.?!]["')\]]?\s*$/.test(t) || t.length >= MAX_UTTERANCE) { flushUtterance(); return; }
            if (flushTimer) clearTimeout(flushTimer);
            flushTimer = setTimeout(flushUtterance, FLUSH_PAUSE_MS);
        }

        function flushUtterance() {
            if (flushTimer) { clearTimeout(flushTimer); flushTimer = null; }
            const utterance = pendingUtterance.trim();
            pendingUtterance = '';
            if (!utterance) return;
            const context = committedTranscript.slice(-CONTEXT_CHARS);
            committedTranscript += utterance + ' ';
            if (utterance.length >= MIN_UTTERANCE) analyzeUtterance(utterance, context);
        }

        // ---------- analysis (streamed over SSE) ----------
        function parseSse(chunk) {
            let event = 'message', data = '';
            for (const line of chunk.split('\n')) {
                if (line.startsWith('event:')) event = line.slice(6).trim();
                else if (line.startsWith('data:')) data += line.slice(5).trim();
            }
            return { event, data: data ? JSON.parse(data) : null };
        }

        async function analyzeUtterance(utterance, context) {
            const card = createAnalyzingCard(utterance);
            let bodyEl = null, sourcesEl = null, answer = '';

            try {
                const resp = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ utterance, context })
                });
                if (!resp.ok || !resp.body) throw new Error(`server ${resp.status}`);

                const reader = resp.body.getReader();
                const decoder = new TextDecoder();
                let buf = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buf += decoder.decode(value, { stream: true });
                    let idx;
                    while ((idx = buf.indexOf('\n\n')) >= 0) {
                        const chunk = buf.slice(0, idx);
                        buf = buf.slice(idx + 2);
                        if (!chunk.trim()) continue;
                        const { event, data } = parseSse(chunk);

                        if (event === 'meta') {
                            if (data.type === 'none') { removeCard(card); return; }
                            const refs = renderSkeleton(card, data);
                            bodyEl = refs.body; sourcesEl = refs.sources;
                        } else if (event === 'delta' && bodyEl) {
                            const atBottom = insightsAtBottom();
                            answer += data.text || '';
                            bodyEl.innerHTML = renderMarkdown(answer);
                            if (atBottom) insightsContainer.scrollTop = insightsContainer.scrollHeight;
                        } else if (event === 'sources' && sourcesEl) {
                            renderSources(sourcesEl, data.sources || []);
                        } else if (event === 'error') {
                            throw new Error(data && data.message ? data.message : 'analysis error');
                        }
                    }
                }
            } catch (err) {
                console.error('ReVerb analyze error:', err);
                removeCard(card);
            }
        }

        // ---------- cards ----------
        function createAnalyzingCard(utterance) {
            placeholderCard.classList.add('hidden');
            const card = document.createElement('div');
            card.className = 'p-4 bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 shadow-sm opacity-75';
            card.innerHTML = `
                <div class="flex items-center space-x-3">
                    ${spinnerSvg}
                    <div>
                        <span class="font-normal text-gray-500 dark:text-gray-400">Analyzing:</span>
                        <em class="text-gray-700 dark:text-gray-300">"${escapeHtmlText(utterance)}"</em>
                    </div>
                </div>`;
            insightsContainer.prepend(card);
            return card;
        }

        function renderSkeleton(card, meta) {
            const title = meta.title || (meta.type === 'question' ? 'Question' : 'Concept');
            const sub = (meta.type === 'question' && meta.question)
                ? `<p class="text-sm text-gray-500 dark:text-gray-400 mb-2">${escapeHtmlText(meta.question)}</p>` : '';
            card.classList.remove('opacity-75');
            card.innerHTML = `
                <div class="flex justify-between items-center">
                    <h3 class="text-lg font-medium text-google-green">${escapeHtmlText(title)}</h3>
                    <button data-toggle="collapse" class="p-1 rounded-full text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700">
                        <svg class="w-5 h-5 chevron-up" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" /></svg>
                        <svg class="w-5 h-5 hidden chevron-down" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 15.75l7.5-7.5 7.5 7.5" /></svg>
                    </button>
                </div>
                <div class="card-body mt-2 pr-2">
                    ${sub}
                    <div class="reverb-answer text-gray-600 dark:text-gray-400 leading-relaxed"><span class="text-gray-400">…</span></div>
                    <div class="reverb-sources mt-3 flex flex-wrap gap-2"></div>
                </div>`;
            return { body: card.querySelector('.reverb-answer'), sources: card.querySelector('.reverb-sources') };
        }

        function renderSources(el, sources) {
            if (!sources.length) return;
            el.innerHTML = '';
            const label = document.createElement('span');
            label.className = 'w-full text-xs uppercase tracking-wide text-gray-400';
            label.textContent = 'Sources';
            el.appendChild(label);
            sources.forEach((s, i) => {
                const a = document.createElement('a');
                a.href = s.uri;
                a.target = '_blank';
                a.rel = 'noopener';
                a.className = 'text-xs px-2 py-1 rounded-full bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-600 dark:text-gray-300 truncate max-w-[14rem]';
                a.textContent = `${i + 1}. ${s.title || s.uri}`;
                el.appendChild(a);
            });
        }

        function removeCard(card) {
            card.classList.add('fade-out');
            setTimeout(() => {
                card.remove();
                if (insightsContainer.children.length === 1) placeholderCard.classList.remove('hidden');
            }, 500);
        }

        // Collapse / expand insight cards
        document.body.addEventListener('click', (e) => {
            const btn = e.target.closest('[data-toggle="collapse"]');
            if (!btn) return;
            const card = btn.closest('.rounded-xl');
            card.querySelector('.card-body').classList.toggle('hidden');
            btn.querySelector('.chevron-up').classList.toggle('hidden');
            btn.querySelector('.chevron-down').classList.toggle('hidden');
        });

        startBtn.addEventListener('click', startListening);
        stopBtn.addEventListener('click', stopListening);
    </script>
</body>
</html>
