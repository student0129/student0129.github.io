    <script>
        // Wake Up Server on Page Load
        fetch('https://api-promontory.onrender.com', { method: 'GET' }).catch(() => {});
    
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const transcriptionEl = document.getElementById('transcription');
        const translationEl = document.getElementById('translation');
        const statusEl = document.getElementById('status');
        const sourceLanguageSelect = document.getElementById('source-language-select');
        const targetLanguageSelect = document.getElementById('target-language-select');
        const transcriptionTitle = document.getElementById('transcription-title');
        const translationTitle = document.getElementById('translation-title');
        const copyBtns = document.querySelectorAll('.copy-btn');
    
        const WS_URL = 'wss://api-promontory.onrender.com';
        const OPENAI_SAMPLE_RATE = 24000;   // OpenAI Realtime expects PCM16 mono @ 24 kHz

        let socket;
        let isListening = false;
        let audioContext = null;
        let workletNode = null;
        let micStream = null;

        // --- Rendering state: committed finals + a live (interim) tail per pane ---
        const finalTranscripts = [];    // { kind: 'speech' | 'unclear', text }
        const finalTranslations = [];   // strings
        let partialTranscript = '';
        let activeTranslationText = '';
        let activeTranslationItemId = null;

        function escapeHtml(s) {
            return s.replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }

        function renderTranscript() {
            const parts = finalTranscripts.map(e =>
                e.kind === 'unclear'
                    ? '<span class="opacity-40 italic">(unclear audio — not translated)</span>'
                    : escapeHtml(e.text)
            );
            let html = parts.join(' ');
            if (partialTranscript) html += `${html ? ' ' : ''}<span class="opacity-50 italic">${escapeHtml(partialTranscript)}</span>`;
            transcriptionEl.innerHTML = html;
            transcriptionEl.scrollTop = transcriptionEl.scrollHeight;
        }

        function renderTranslation() {
            const committed = finalTranslations.join(' ');
            translationEl.innerHTML = escapeHtml(committed)
                + (activeTranslationText ? `${committed ? ' ' : ''}<span class="opacity-50 italic">${escapeHtml(activeTranslationText)}</span>` : '');
            translationEl.scrollTop = translationEl.scrollHeight;
        }

        function onTranslationDelta(itemId, delta) {
            // A new utterance's translation started before the previous 'done' arrived — commit it.
            if (activeTranslationItemId && activeTranslationItemId !== itemId && activeTranslationText) {
                finalTranslations.push(activeTranslationText);
                activeTranslationText = '';
            }
            activeTranslationItemId = itemId;
            activeTranslationText += delta;
            renderTranslation();
        }

        function onTranslationDone(itemId, text) {
            finalTranslations.push(text || activeTranslationText);
            activeTranslationText = '';
            activeTranslationItemId = null;
            renderTranslation();
        }

        function handleServerMessage(data) {
            switch (data.type) {
                case 'speech_started':
                    setStatus('Listening...', true);
                    break;
                case 'partial_transcript':
                    partialTranscript = data.text || '';
                    renderTranscript();
                    break;
                case 'final_transcript':
                    partialTranscript = '';
                    if (data.text) finalTranscripts.push({ kind: 'speech', text: data.text });
                    renderTranscript();
                    setStatus('Translating...', true);
                    break;
                case 'unclear':
                    // Server couldn't transcribe clearly (or heard the wrong language) — show a
                    // muted note in the transcript pane and translate nothing.
                    partialTranscript = '';
                    finalTranscripts.push({ kind: 'unclear' });
                    renderTranscript();
                    setStatus('Unclear audio — skipped', true);
                    break;
                case 'translation_delta':
                    onTranslationDelta(data.itemId, data.delta || '');
                    break;
                case 'translation_done':
                    onTranslationDone(data.itemId, data.text || '');
                    setStatus('Listening...', true);
                    break;
                case 'error':
                    console.error('Server:', data.message);
                    setStatus(`Error: ${data.message}`);
                    break;
            }
        }

        // --- Microphone → PCM16 capture via an AudioWorklet (runs off the main thread) ---
        const PCM_WORKLET_CODE = `
            class PCMWorklet extends AudioWorkletProcessor {
                constructor() { super(); this._buf = []; this._count = 0; this._target = 2048; }
                process(inputs) {
                    const ch = inputs[0] && inputs[0][0];
                    if (ch && ch.length) {
                        this._buf.push(ch.slice(0));
                        this._count += ch.length;
                        if (this._count >= this._target) {
                            const out = new Float32Array(this._count);
                            let o = 0;
                            for (const b of this._buf) { out.set(b, o); o += b.length; }
                            this.port.postMessage(out, [out.buffer]);
                            this._buf = []; this._count = 0;
                        }
                    }
                    return true;
                }
            }
            registerProcessor('pcm-worklet', PCMWorklet);
        `;

        function floatTo16BitPCM(float32) {
            const out = new Int16Array(float32.length);
            for (let i = 0; i < float32.length; i++) {
                const s = Math.max(-1, Math.min(1, float32[i]));
                out[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
            }
            return out;
        }

        // Linear-interpolation resample, used only if the browser won't give us a 24 kHz context.
        function downsample(buffer, inRate, outRate) {
            if (outRate === inRate) return buffer;
            const ratio = inRate / outRate;
            const outLen = Math.round(buffer.length / ratio);
            const out = new Float32Array(outLen);
            for (let i = 0; i < outLen; i++) {
                const idx = i * ratio;
                const i0 = Math.floor(idx);
                const i1 = Math.min(i0 + 1, buffer.length - 1);
                const frac = idx - i0;
                out[i] = buffer[i0] * (1 - frac) + buffer[i1] * frac;
            }
            return out;
        }

        async function startAudioCapture(stream) {
            // Prefer a 24 kHz context so the browser resamples for us; fall back to manual resampling.
            try {
                audioContext = new AudioContext({ sampleRate: OPENAI_SAMPLE_RATE });
            } catch (e) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') await audioContext.resume();

            const blobUrl = URL.createObjectURL(new Blob([PCM_WORKLET_CODE], { type: 'application/javascript' }));
            await audioContext.audioWorklet.addModule(blobUrl);
            URL.revokeObjectURL(blobUrl);

            const inRate = audioContext.sampleRate;
            const source = audioContext.createMediaStreamSource(stream);
            workletNode = new AudioWorkletNode(audioContext, 'pcm-worklet');

            workletNode.port.onmessage = (e) => {
                if (!(socket && socket.readyState === WebSocket.OPEN)) return;
                let float = e.data;
                if (inRate !== OPENAI_SAMPLE_RATE) float = downsample(float, inRate, OPENAI_SAMPLE_RATE);
                socket.send(floatTo16BitPCM(float).buffer);
            };

            // Keep the node in the render graph without echoing audio to the speakers.
            const mute = audioContext.createGain();
            mute.gain.value = 0;
            source.connect(workletNode);
            workletNode.connect(mute);
            mute.connect(audioContext.destination);
        }

        function resetPanes() {
            finalTranscripts.length = 0;
            finalTranslations.length = 0;
            partialTranscript = '';
            activeTranslationText = '';
            activeTranslationItemId = null;
            transcriptionEl.textContent = '';
            translationEl.textContent = '';
        }

        function stopEverything() {
            isListening = false;
            if (workletNode) {
                try { workletNode.port.onmessage = null; workletNode.disconnect(); } catch (e) {}
                workletNode = null;
            }
            if (audioContext && audioContext.state !== 'closed') audioContext.close().catch(() => {});
            audioContext = null;
            if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
        }
    
        function updateTitles() {
            const sourceLangText = sourceLanguageSelect.options[sourceLanguageSelect.selectedIndex].text;
            const targetLangText = targetLanguageSelect.options[targetLanguageSelect.selectedIndex].text;
            transcriptionTitle.textContent = `Original (${sourceLangText})`;
            translationTitle.textContent = `Translation (${targetLangText})`;
        }
    
        function setStatus(text, isListeningActive = false) {
            let listeningIndicator = isListeningActive ? `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5 mr-2 text-red-500 animate-pulse"><path d="M3 10v4"></path><path d="M8 7v10"></path><path d="M13 4v16"></path><path d="M18 7v10"></path><path d="M23 10v4"></path></svg>` : '';
            statusEl.innerHTML = `${listeningIndicator} ${text}`;
        }
    
        function copyToClipboard(elementId, button) {
            const textToCopy = document.getElementById(elementId).innerText;
            if (!textToCopy) return;
            const tempTextArea = document.createElement('textarea');
            tempTextArea.value = textToCopy;
            document.body.appendChild(tempTextArea);
            tempTextArea.select();
            document.execCommand('copy');
            document.body.removeChild(tempTextArea);
            const originalIcon = button.innerHTML;
            button.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-green-400"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg>`;
            setTimeout(() => button.innerHTML = originalIcon, 2000);
        }
    
        function cleanup() {
            stopEverything();
            socket = null;
            startBtn.disabled = false;
            stopBtn.disabled = true;
            setStatus('Disconnected from server.');
        }

        startBtn.addEventListener('click', async () => {
            resetPanes();
            try {
                micStream = await navigator.mediaDevices.getUserMedia({
                    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
                });

                // ABSOLUTE WEBSOCKET URL POINTING TO YOUR API
                socket = new WebSocket(WS_URL);
                socket.binaryType = 'arraybuffer';

                socket.onopen = async () => {
                    isListening = true;
                    startBtn.disabled = true;
                    stopBtn.disabled = false;
                    socket.send(JSON.stringify({
                        sourceLanguage: sourceLanguageSelect.value,
                        targetLanguage: targetLanguageSelect.value
                    }));
                    try {
                        await startAudioCapture(micStream);
                        setStatus('Listening...', true);
                    } catch (err) {
                        console.error('Audio capture error:', err);
                        setStatus('Could not start audio capture.');
                        if (socket && socket.readyState === WebSocket.OPEN) socket.close();
                        else cleanup();
                    }
                };

                socket.onmessage = (event) => {
                    try { handleServerMessage(JSON.parse(event.data)); }
                    catch (e) { console.error('Bad server message:', e); }
                };

                socket.onclose = cleanup;
                socket.onerror = (error) => {
                    console.error('WebSocket Error:', error);
                    setStatus('Error connecting to server.');
                    cleanup();
                };
            } catch (error) {
                console.error('Error accessing microphone:', error);
                setStatus('Could not access microphone. Please grant permission.');
            }
        });

        stopBtn.addEventListener('click', () => {
            isListening = false;
            setStatus('Stopping...');
            stopBtn.disabled = true;
            stopEverything();
            if (socket && socket.readyState === WebSocket.OPEN) socket.close();
            else cleanup();
        });
        
        sourceLanguageSelect.addEventListener('change', () => {
            if (socket && socket.readyState === WebSocket.OPEN) socket.send(JSON.stringify({ sourceLanguage: sourceLanguageSelect.value }));
            updateTitles();
        });
    
        targetLanguageSelect.addEventListener('change', () => {
            if (socket && socket.readyState === WebSocket.OPEN) socket.send(JSON.stringify({ targetLanguage: targetLanguageSelect.value }));
            updateTitles();
        });
    
        copyBtns.forEach(btn => btn.addEventListener('click', () => copyToClipboard(btn.dataset.target, btn)));
    
        updateTitles();
        setStatus('Ready to connect.');
    
        const speakBtns = document.querySelectorAll('.speak-btn');
        let activeAudioInstances = new Map(); 
        let buttonStates = new Map(); 
        
        const speakIconSVG = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.114 5.636a9 9 0 010 12.728M16.463 8.288a5.25 5.25 0 010 7.424M6.75 8.25l4.72-4.72a.75.75 0 011.28.53v15.88a.75.75 0 01-1.28.53l-4.72-4.72H4.5c-.69 0-1.25-.56-1.25-1.25v-6.5c0-.69.56-1.25 1.25-1.25h2.25z" /></svg>`;
        const stopIconSVG = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-red-400"><path stroke-linecap="round" stroke-linejoin="round" d="M5.25 7.5A2.25 2.25 0 017.5 5.25h9a2.25 2.25 0 012.25 2.25v9a2.25 2.25 0 01-2.25 2.25h-9a2.25 2.25 0 01-2.25-2.25v-9z" /></svg>`;
        const loadingIconSVG = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 animate-spin"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" /></svg>`;
        const successIconSVG = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-green-400"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg>`;
        const errorIconSVG = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-red-400"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" /></svg>`;
        
        function stopAudioAndReset(button) {
            const audio = activeAudioInstances.get(button);
            if (audio) {
                audio.pause();
                audio.currentTime = 0;
                if (audio.src && audio.src.startsWith('blob:')) URL.revokeObjectURL(audio.src);
                activeAudioInstances.delete(button);
            }
            button.innerHTML = speakIconSVG;
            button.disabled = false;
            buttonStates.set(button, 'ready');
        }
        
        async function speakText(text, langType, button) {
            if (!text.trim()) return;
            const currentState = buttonStates.get(button) || 'ready';
            
            if (currentState === 'playing') return stopAudioAndReset(button);
            if (currentState === 'loading') return;
            
            buttonStates.set(button, 'loading');
            button.innerHTML = loadingIconSVG;
            button.disabled = false; 
            
            try {
                // ABSOLUTE URL POINTING TO YOUR NEW RENDER API
                const response = await fetch('https://api-promontory.onrender.com/api/tts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: text,
                        language: langType === 'source' ? sourceLanguageSelect.value : targetLanguageSelect.value
                    })
                });
                
                if (!response.ok) throw new Error('TTS request failed');
                
                const audioBlob = await response.blob();
                const audioUrl = URL.createObjectURL(audioBlob);
                const audio = new Audio(audioUrl);
                activeAudioInstances.set(button, audio);
                
                audio.onloadeddata = () => {
                    button.innerHTML = stopIconSVG;
                    buttonStates.set(button, 'playing');
                };
                
                audio.onended = () => {
                    URL.revokeObjectURL(audioUrl);
                    activeAudioInstances.delete(button);
                    button.innerHTML = successIconSVG;
                    setTimeout(() => {
                        button.innerHTML = speakIconSVG;
                        buttonStates.set(button, 'ready');
                        button.disabled = false;
                    }, 1000);
                };
                
                audio.onerror = () => {
                    URL.revokeObjectURL(audioUrl);
                    activeAudioInstances.delete(button);
                    showErrorState(button);
                };
                
                await audio.play();
                
            } catch (error) {
                console.error('TTS Error:', error);
                showErrorState(button);
            }
        }
        
        function showErrorState(button) {
            button.innerHTML = errorIconSVG;
            buttonStates.set(button, 'error');
            setTimeout(() => {
                button.innerHTML = speakIconSVG;
                buttonStates.set(button, 'ready');
                button.disabled = false;
            }, 2000);
        }
        
        speakBtns.forEach(btn => {
            buttonStates.set(btn, 'ready');
            btn.addEventListener('click', () => {
                const targetId = btn.dataset.target;
                const langType = btn.dataset.langType;
                const textContent = document.getElementById(targetId).innerText;
                speakText(textContent, langType, btn);
            });
        });
        
        window.addEventListener('beforeunload', () => {
            activeAudioInstances.forEach((audio, button) => {
                if (audio && audio.src && audio.src.startsWith('blob:')) URL.revokeObjectURL(audio.src);
            });
        });
    </script>
</body>
</html>
